  subtitle: "Get matched with licensed local hurricane shutter installers serving Port Charlotte, Charlotte Harbor, and surrounding Charlotte County. Free, no-obligation estimates on storm panels, accordion, and roll-down shutters — built for Charlotte County's post-Ian wind zone."
  reassurance: "✓ 100% free, no obligation &nbsp; ✓ Licensed local installers only &nbsp; ✓ Your info is never sold to unrelated third parties"

trustbar: "Free matching service · Licensed &amp; insured local installers · Serving Port Charlotte &amp; Charlotte County"

steps:
  title: "How it works: from request to quote in 3 steps"
  items:
    - title: "1. Tell us about your project"
      text: "Fill out the short form: ZIP code, shutter type you're considering, and a bit about your home. The more complete your request, the more accurate the quotes you'll receive."
    - title: "2. Get connected with local installers"
      text: "We match your request with licensed hurricane shutter installers who work in the Port Charlotte area. They'll typically reach out within 24 hours to schedule a free, in-home estimate."
