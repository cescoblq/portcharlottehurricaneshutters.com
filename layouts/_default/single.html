{{ define "main" }}
{{ partial "navbar.html" . }}
<section class="page-header">
  <div class="container">
    <h1>{{ .Title }}</h1>
  </div>
</section>
<section class="single-post">
  <div class="container">
    <div class="row">
      <div class="col-md-8">
        <div class="post-content">
          {{ .Content }}
        </div>
      </div>
      {{ if ne .Params.showForm false }}
      <div class="col-md-4">
        <div class="single-sidebar">
          <h4 class="single-sidebar-title">Get free quotes</h4>
          {{ partial "lead-form.html" (dict "step" (printf "page-%s" .File.BaseFileName) "context" .) }}
        </div>
      </div>
      {{ end }}
    </div>
  </div>
</section>
{{ partial "footer.html" . }}
{{ end }}
