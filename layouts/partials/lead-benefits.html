<section id="lead-benefits" class="lead-benefits">
  <div class="container">
    <div class="row align-items-center">
      <div class="col-md-6">
        <h2>{{ .Site.Data.lead.benefits.title }}</h2>
        <ul>
          {{ range .Site.Data.lead.benefits.items }}
          <li><strong>{{ .title }}</strong> — {{ .text }}</li>
          {{ end }}
        </ul>
      </div>
      <div class="col-md-6">
        <figure class="lead-benefits-img-wrap">
          <img src="{{ `images/lead/hurricane-shutters-install.jpg` | relURL }}" alt="Hurricane shutters installed on a Florida home" class="lead-benefits-img" loading="lazy">
        </figure>
      </div>
    </div>
  </div>
</section>
<section id="lead-social" class="lead-social">
  <div class="container">
    <h2>{{ .Site.Data.lead.social.title }}</h2>
    <p>{{ .Site.Data.lead.social.text }}</p>
  </div>
</section>
