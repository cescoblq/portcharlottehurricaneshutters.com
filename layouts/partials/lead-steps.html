<section id="lead-steps" class="lead-steps">
  <div class="container">
    <h2>{{ .Site.Data.lead.steps.title }}</h2>
    <div class="row">
      {{ range .Site.Data.lead.steps.items }}
      <div class="col-md-4">
        <h4>{{ .title }}</h4>
        <p>{{ .text }}</p>
      </div>
      {{ end }}
    </div>
    <p class="lead-transparency"><em>{{ .Site.Data.lead.steps.transparency }}</em></p>
  </div>
</section>
