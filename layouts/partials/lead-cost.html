<section id="lead-cost" class="lead-cost">
  <div class="container">
    <h2>{{ .Site.Data.lead.cost.title }}</h2>
    <p>{{ .Site.Data.lead.cost.intro }}</p>
    <div class="table-responsive">
      <table class="table table-bordered lead-cost-table">
        <thead>
          <tr><th>Type of shutter</th><th>Scope</th><th>Approximate price (installed)</th></tr>
        </thead>
        <tbody>
          {{ range .Site.Data.lead.cost.rows }}
          <tr><td>{{ .type }}</td><td>{{ .size }}</td><td>{{ .price }}</td></tr>
          {{ end }}
        </tbody>
      </table>
    </div>
    <p class="lead-cost-note">{{ .Site.Data.lead.cost.note }}</p>
    <a href="#lead-hero" class="btn btn-primary lead-cta-btn">{{ .Site.Data.lead.cost.cta }}</a>
  </div>
</section>
