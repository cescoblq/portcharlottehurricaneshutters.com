    text_color = "#3a3a3a"
    text_dark = "#1d1d1d"
    text_light = "#6b6b6b"
    border_color = "#ACB9C4"
    black = "#000000"
    white = "#ffffff"
    light = "#f5f7f9"
    font_size = "16px"
    font_scale = "1.25"
    font_primary = "Roboto:wght@300;400;500;700"
    font_primary_type = "sans-serif"
    font_secondary = "Roboto:wght@700"
    font_secondary_type = "sans-serif"
